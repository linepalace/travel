<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 清境與合歡北峰交通規劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 移除 X 與 Y 軸偏移，改為中心擴散陰影 */
        .centered-shadow-lg { 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1); 
        }
        
        .active-tab { 
            background-color: #059669; 
            color: white; 
            box-shadow: 0 0 12px rgba(5, 150, 105, 0.4); 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-12">

    <!-- Header -->
    <div class="bg-emerald-800 text-white pt-10 pb-20 px-6 relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <div class="inline-flex items-center gap-2 mb-4 bg-emerald-700/50 px-3 py-1 rounded-full text-xs">
                <span>📅</span> 2026/04/04 - 04/06 (清明連假)
            </div>
            <h1 class="text-3xl md:text-5xl font-bold mb-3 tracking-tight">清境與合歡北峰</h1>
            <p class="text-emerald-100 text-base md:text-lg max-w-xl opacity-90">三天兩夜大眾運輸交通指南：登山、悠遊與輕鬆轉乘全紀錄。</p>
            
            <button onclick="copyLink()" class="mt-6 flex items-center gap-2 bg-white text-emerald-800 px-5 py-2.5 rounded-xl font-bold hover:bg-emerald-50 transition-all shadow-lg text-sm">
                <span>🔗</span> 分享文字行程
            </button>
        </div>
        <!-- Abstract mountain shape -->
        <div class="absolute -bottom-1 right-0 left-0 h-12 bg-slate-50" style="clip-path: polygon(0 100%, 100% 100%, 100% 0, 85% 60%, 70% 20%, 55% 70%, 40% 10%, 25% 60%, 0 0)"></div>
    </div>

    <div class="max-w-4xl mx-auto px-4 -mt-50">
        <!-- Tabs Container (Shadow changed to centered) -->
        <div class="flex bg-white p-1.5 rounded-2xl centered-shadow-lg mb-6 overflow-x-auto no-scrollbar">
            <button onclick="switchDay(0)" id="btn-0" class="flex-1 py-3 px-4 rounded-xl text-center min-w-[90px] transition-all active-tab">
                <div class="text-[10px] opacity-80 uppercase">Day 1</div>
                <div class="font-bold text-sm">4/4 (六)</div>
            </button>
            <button onclick="switchDay(1)" id="btn-1" class="flex-1 py-3 px-4 rounded-xl text-center min-w-[90px] transition-all text-slate-500">
                <div class="text-[10px] opacity-80 uppercase">Day 2</div>
                <div class="font-bold text-sm">4/5 (日)</div>
            </button>
            <button onclick="switchDay(2)" id="btn-2" class="flex-1 py-3 px-4 rounded-xl text-center min-w-[90px] transition-all text-slate-500">
                <div class="text-[10px] opacity-80 uppercase">Day 3</div>
                <div class="font-bold text-sm">4/6 (一)</div>
            </button>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Main Content -->
            <div class="lg:w-2/3 space-y-6">
                <div id="content-card" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-6 text-emerald-600">
                        <div>
                            <h2 id="day-title" class="text-xl font-bold text-slate-800">載入中...</h2>
                            <p id="day-desc" class="text-slate-500 text-sm mt-1"></p>
                        </div>
                        <div class="bg-emerald-50 p-3 rounded-2xl" id="day-icon">🚌</div>
                    </div>

                    <div id="timeline" class="space-y-6 relative before:content-[''] before:absolute before:left-[1.1rem] before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                        <!-- Steps injected by JS -->
                    </div>
                </div>
                
                <!-- Bus Table -->
                <div class="bg-slate-800 text-slate-100 p-5 rounded-3xl shadow-lg">
                    <h3 class="flex items-center gap-2 font-bold text-base mb-4">
                        <span class="text-emerald-400">🕒</span> 當日關鍵班次 (首/末班)
                    </h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-700 text-slate-400">
                                <tr>
                                    <th class="px-3 py-2">路線</th>
                                    <th class="px-3 py-2">首班</th>
                                    <th class="px-3 py-2">末班</th>
                                </tr>
                            </thead>
                            <tbody id="bus-table-body" class="divide-y divide-slate-700">
                                <!-- Rows injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:w-1/3 space-y-6">
                <!-- Alert -->
                <div class="bg-orange-50 border border-orange-200 p-5 rounded-3xl">
                    <h3 class="flex items-center gap-2 font-bold text-orange-800 mb-2 text-sm">
                        ⚠️ 重要預約提醒
                    </h3>
                    <p class="text-xs text-orange-700 leading-relaxed mb-4">
                        <b>6658A 合歡山線</b> 座位極少，請於 <b>3/28 (六)</b> 準時至官網預約 Day 2 班次。
                    </p>
                    <a href="https://ntbus.welcometw.com/tour/listAll?category=5bM" target="_blank" class="block text-center bg-orange-600 text-white py-2 rounded-xl text-xs font-bold shadow-sm">
                        前往南投假期預約
                    </a>
                </div>

                <!-- Packing -->
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
                        ℹ️ 登山應備物品
                    </h3>
                    <ul class="space-y-2 text-xs text-slate-600">
                        <li class="flex items-start gap-2"><span>✅</span> 身份證、悠遊卡/一卡通</li>
                        <li class="flex items-start gap-2"><span>✅</span> 防風防水外套 (高山氣溫低)</li>
                        <li class="flex items-start gap-2"><span>✅</span> 1-2L 水與行動糧食</li>
                        <li class="flex items-start gap-2"><span>✅</span> 防曬乳、遮陽帽</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-center text-slate-400 text-[10px] px-6 leading-relaxed">
        <p>© 2026 清境合歡北峰登山小組<br>建議下載 iBus App 即時查看公車動態</p>
    </footer>

    <script>
        const data = [
            {
                date: '4/4 (六)', title: '啟程：台北 ➔ 清境', desc: '從台北出發前往南投，入住國民賓館。', icon: '🚌',
                steps: [
                    { time: '07:30', act: '國光客運 1832', det: '台北轉運站 ➔ 埔里站' },
                    { time: '11:30', act: '抵達埔里', det: '稍作休息，準備轉乘南投客運' },
                    { time: '12:20', act: '南投客運 6658系列', det: '埔里站 ➔ 國民賓館站' },
                    { time: '14:00', act: '入住國民賓館', det: '辦理入住，下午自由活動' }
                ],
                bus: [
                    { line: '國光 1832', f: '06:00', l: '21:00' },
                    { line: '南投客運', f: '06:00', l: '16:35' }
                ]
            },
            {
                date: '4/5 (日)', title: '挑戰：合歡山北峰', desc: '全日行程專注於合歡北峰攀登，享受美景。', icon: '🏔️',
                steps: [
                    { time: '08:20', act: '南投客運 6658A', det: '國民賓館 ➔ 小風口 (務必預約)' },
                    { time: '09:40', act: '抵達小風口', det: '整理裝備，步行至登山口' },
                    { time: '10:00', act: '攀登北峰', det: '來回約需 4 小時，注意保暖' },
                    { time: '15:50', act: '回程末班車', det: '小風口 ➔ 國民賓館 (逾時不候)' }
                ],
                bus: [
                    { line: '6658A (去)', f: '08:20', l: '14:30' },
                    { line: '6658A (回)', f: '09:40', l: '15:50' }
                ]
            },
            {
                date: '4/6 (一)', title: '歸途：清境 ➔ 台北', desc: '上午悠閒逛草原，下午避開車潮下山。', icon: '🐑',
                steps: [
                    { time: '09:00', act: '青青草原', det: '觀看綿羊秀與欣賞高山景色' },
                    { time: '12:00', act: '退房午餐', det: '在國民賓館附近商店街用餐' },
                    { time: '13:30', act: '南投客運', det: '國民賓館 ➔ 埔里站' },
                    { time: '15:30', act: '國光客運 1832', det: '埔里站 ➔ 台北轉運站' }
                ],
                bus: [
                    { line: '南投客運', f: '07:20', l: '18:20' },
                    { line: '國光 1832', f: '05:30', l: '21:00' }
                ]
            }
        ];

        function switchDay(index) {
            const day = data[index];
            document.getElementById('day-title').innerText = day.title;
            document.getElementById('day-desc').innerText = day.desc;
            document.getElementById('day-icon').innerText = day.icon;

            [0, 1, 2].forEach(i => {
                const btn = document.getElementById(`btn-${i}`);
                if (i === index) {
                    btn.classList.add('active-tab');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('active-tab');
                    btn.classList.add('text-slate-500');
                }
            });

            const timeline = document.getElementById('timeline');
            timeline.innerHTML = day.steps.map(s => `
                <div class="relative pl-10">
                    <div class="absolute left-0 w-9 h-9 bg-white border-2 border-slate-200 rounded-full flex items-center justify-center z-10 text-emerald-600 shadow-sm text-sm">
                        📍
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded uppercase">${s.time}</span>
                        <h3 class="font-bold text-sm mt-1 text-slate-800">${s.act}</h3>
                        <p class="text-slate-500 text-xs">${s.det}</p>
                    </div>
                </div>
            `).join('');

            const table = document.getElementById('bus-table-body');
            table.innerHTML = day.bus.map(b => `
                <tr class="hover:bg-slate-700/50 transition-colors">
                    <td class="px-3 py-3 font-medium">${b.line}</td>
                    <td class="px-3 py-3 text-emerald-400">${b.f}</td>
                    <td class="px-3 py-3 text-orange-400">${b.l}</td>
                </tr>
            `).join('');
        }

        function copyLink() {
            const text = "2026 清境合歡北峰交通規劃：\n4/4 台北-清境\n4/5 登合歡北峰(需預約6658A)\n4/6 清境-台北";
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const toast = document.createElement('div');
            toast.innerText = "文字摘要已複製！";
            toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#059669; color:white; padding:10px 20px; border-radius:10px; z-index:1000; font-size:12px;";
            document.body.appendChild(toast);
            setTimeout(() => document.body.removeChild(toast), 2000);
        }

        window.onload = () => switchDay(0);
    </script>
</body>
</html>
